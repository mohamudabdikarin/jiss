# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo in Render → New Blueprint Instance → select render.yaml
#
# After deploy: set secret env vars in the Render dashboard (MongoDB, JWT, R2, SMTP).
# Deploy client + admin as Render "Static Sites" (see docs/RENDER.md) or on Vercel.

version: "1"

services:
  - type: web
    name: ijcds-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # Optional: Vercel preview URLs, extra domains (comma-separated)
      - key: CORS_EXTRA_ORIGINS
        sync: false
