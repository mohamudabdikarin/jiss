# IJCDS stack for Dokploy / Docker Compose: API + public client + admin + MongoDB.
# Dokploy: create a Compose project, point it at this file, then assign a domain per service
# (api → port 5000, client → 80, admin → 80). See docs/DOKPLOY.md.

networks:
  internal:
    driver: bridge

volumes:
  mongo_data:

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/ijcds-cms}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in project environment}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      CLIENT_URL: ${CLIENT_URL:?Set CLIENT_URL to your public site origin}
      ADMIN_URL: ${ADMIN_URL:?Set ADMIN_URL to your admin origin}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      ADMIN_EMAIL_CC: ${ADMIN_EMAIL_CC:-}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${CLIENT_VITE_API_URL:?Set CLIENT_VITE_API_URL to full public API URL including /public}
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${ADMIN_VITE_API_URL:?Set ADMIN_VITE_API_URL to full admin API base (no /public)}
        VITE_GA_DASHBOARD_URL: ${VITE_GA_DASHBOARD_URL:-}
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "80"
